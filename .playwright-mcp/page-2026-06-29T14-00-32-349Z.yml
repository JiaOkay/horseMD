              - generic [ref=e143]:
                - text: 📝 我做了个免费的 Typora 平替，更新到 v0.1.6 啦 一直在用 Typora，但它每开一个 md 文件就弹一个新窗口，开多了任务栏全是它😮‍‍💨 于是自己撸了一个——HorseMD。 打字即渲染没变，但加上了 Typora 一直没有的： ✅ 标签页——所有文件挤在一个窗口‍‍ ✅ 文件树——整个文件夹挂侧边栏，增删改不用切出去 ✅ 命令面板（⌘P）秒跳任何文件 ✅ .富文本复制——粘进公众号 / 邮件 / Notion 不丢格式 ✅ .6 套主题（含 4 套莫兰迪）🎨‍‍ ‍‍ 这次更新：导出 PDF、标题层级补齐到NH1–H6、标签多了自动滚动定位、还修了一堆小 bug～ ‍‍ 💻 Windows + macOS 都能用，完全免费开源，不要账号 🔗 官网：horsemd.yangsir.net（搜 HorseMD 就能找到） ‍‍ ‍‍
